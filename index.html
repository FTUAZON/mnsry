<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mnsry</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden; /* Prevent horizontal scroll */
    position: relative;
    margin: 0;
    padding: 0;
}

.hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 50px 15px;
    position: relative;
    z-index: 1;
}

/* Titles */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 50px;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 0.3s;
}

.subtitle {
    font-size: 20px;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 0.6s;
}

/* Fade-in animation */
@keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(20px);}
    100% { opacity: 1; transform: translateY(0);}
}

/* Video */
.video-element {
    width: 100%;
    max-width: 400px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 0.9s;
    display: block;
}

/* Card message */
.card-message {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    border-radius: 20px;
    padding: 25px 30px;
    max-width: 500px;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 1.5s;
}

/* I Love You with heartbeat and glow */
.love-text {
    font-family: 'Great Vibes', cursive;
    font-size: 32px;
    margin-top: 15px;
    color: #fff;
    text-shadow:
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 15px #fff,
        0 0 20px #fff,
        0 0 25px #fff;
    opacity: 0;
    animation: fadeInUp 1s ease forwards, heartbeat 1.2s infinite;
    animation-delay: 2s;
    letter-spacing: 1px;
}

/* Heartbeat animation */
@keyframes heartbeat {
    0% { transform: scale(1); }
    14% { transform: scale(1.3); }
    28% { transform: scale(1); }
    42% { transform: scale(1.3); }
    70%, 100% { transform: scale(1); }
}

/* Footer */
.footer {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 2.5s;
}

/* Floating Hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(-45deg);
    bottom: -20px;
    animation: floatUp 5s linear infinite;
    opacity: 0.7;
    z-index: 0;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: 10px; top: 0; }

@keyframes floatUp {
    0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0.7;}
    50% { opacity: 1; }
    100% { transform: translateX(calc(-50px + 100px*var(--x))) translateY(-600px) rotate(-45deg); opacity: 0;}
}

/* Prevent side scroll on small screens */
@media (max-width: 576px) {
    .video-element {
        max-width: 95%; /* Make sure video stays inside viewport */
    }
}
</style>
</head>

<body>

<section class="hero container">
    <h1 class="title">Happy Monthsary</h1>
    <h2 class="subtitle">Haniiii 💖</h2>

    <!-- VIDEO BELOW DATE -->
    <video class="video-element" autoplay muted loop playsinline>
        <source src="1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- SIMPLE MESSAGE -->
    <div class="card-message">
        <p>“My beloved is mine, and I am hers.” – Song of Solomon 2:16</p>
        <br>
        <p>Thank you for being in my life. Looking forward to more months together.</p>
        <p class="love-text">I Love You ❤️</p>
    </div>

    <div class="footer mt-4">
        Made with love<br>
        -mertch-
    </div>
</section>

<!-- Floating hearts -->
<script>
const numberOfHearts = 15;
for(let i=0;i<numberOfHearts;i++){
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random()*95 + 'vw'; // keep hearts inside viewport
    heart.style.setProperty('--x', Math.random());
    heart.style.animationDuration = (4 + Math.random()*3) + 's';
    heart.style.animationDelay = (Math.random()*3) + 's';
    document.body.appendChild(heart);
}

// Mobile autoplay fallback
const video = document.querySelector('.video-element');
video.play().catch(() => {
    console.log("Autoplay prevented. User interaction required.");
});
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
